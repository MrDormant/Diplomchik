name: diplomchik

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: construction_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d construction_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/construction_db
      # Только для локального Docker (≥32 символа — требование Settings.secret_key).
      SECRET_KEY: docker-local-dev-placeholder-key-change-for-real-deploy-32
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_USE_TLS: "false"
      OPERATOR_EMAIL: operator@example.com
      MANAGER_PHONE: "+74951234567"
      CALC_PRICE_PER_SQM: "8500"
      SMTP_FROM: noreply@construction.local
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  pgdata:
